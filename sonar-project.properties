# SonarQube / SonarCloud project configuration
# ===============================================

# Project identification
sonar.projectKey=tiktok-analytics-studio
sonar.organization=eduarda3094
sonar.projectName=TikTok Analytics Studio
sonar.projectVersion=1.0.0

# Source code paths
sonar.sources=src,mini-services
sonar.exclusions=**/node_modules/**,**/.next/**,**/coverage/**,**/tests/**,src/components/ui/**,public/**,examples/**,scripts/**,skills/**

# Test paths
sonar.tests=tests
sonar.test.inclusions=**/*.test.ts,**/*.spec.ts

# Coverage (LCov format from vitest)
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.coverage.exclusions=**/node_modules/**,**/.next/**,src/components/ui/**,tests/**,scripts/**

# Language
sonar.language=ts

# Encoding
sonar.sourceEncoding=UTF-8

# TypeScript configuration
sonar.typescript.tsconfigPath=tsconfig.json

# Issue assignment
sonar.issuesDefaultAssignee=

# Duplication
sonar.cpd.exclusions=**/node_modules/**,**/*.test.ts,src/components/ui/**

# Branch analysis (set by SonarCloud automatically on CI)
# sonar.branch=

# Pull request analysis (set by SonarCloud automatically on CI)
# sonar.pullrequest.key=
# sonar.pullrequest.branch=
# sonar.pullrequest.base=
